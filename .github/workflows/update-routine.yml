name: Update Routine and Deploy to Pages

on:
  push:
    branches:
      - main
    paths:
      - 'routine.pdf'
      - 'scripts/extract_routine.py'
      - 'index.html'           # Triggers if you update your frontend
      - 'app.js'                # OPTIONAL: Add if you have a JS folder
      - 'style.css'               # OPTIONAL: Add if you have a CSS folder
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  process-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Check JSON for overright flag
        id: check_json
        run: |
          SKIP_COMMIT="false"
          if [ -f "data/routine_data.json" ]; then
            # Read the value. 
            # Note: We use 'jq -r' and check against the string "false"
            VAL=$(jq -r '.overright' data/routine_data.json)
            echo "DEBUG: The value of overright in JSON is '$VAL'"
            
            if [ "$VAL" = "false" ]; then
              SKIP_COMMIT="true"
              echo "Overright is false. Setting SKIP_COMMIT to true."
            fi
          else
            echo "File data/routine_data.json not found."
          fi
          echo "SKIP_COMMIT=$SKIP_COMMIT" >> $GITHUB_ENV

      - name: Extract Data from PDF
        run: |
          python scripts/extract_routine.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Always add non-data files (e.g., index.html)
          git add index.html
          
          # 2. Only add the JSON file if SKIP_COMMIT is NOT true
          if [ "${{ env.SKIP_COMMIT }}" = "true" ]; then
            echo "Overright is false: Skipping stage for data/routine_data.json"
          else
            echo "Overright is true (or missing): Staging data/routine_data.json"
            git add data/routine_data.json
          fi
          
          # 3. Final commit check
          if git diff --staged --quiet; then
            echo "No changes detected to commit."
          else
            echo "Changes detected, committing and pushing."
            git commit -m "Auto-update site files [bot]"
            git pull --rebase origin main
            git push
          fi

      - name: Setup Pages Configuration
        uses: actions/configure-pages@v5

      - name: Package Static Site Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages Live
        id: deployment
        uses: actions/deploy-pages@v4
