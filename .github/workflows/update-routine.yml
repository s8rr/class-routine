name: Update Routine and Deploy to Pages

on:
  push:
    branches:
      - main
    paths:
      - 'routine.pdf'                  # Runs when you upload a new PDF
      - 'scripts/extract_routine.py'   # Runs if you update the Python script
  workflow_dispatch:                   # Allows you to trigger it manually via a button

# Give the script permission to commit data AND write updates to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Prevent concurrent deployments from colliding with each other
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  process-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Extract Data from PDF
        run: |
          python scripts/extract_routine.py

      - name: Commit and Push Data Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/routine_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update routine data [bot]" && git push)

      # --- NEW: GITHUB PAGES DEPLOYMENT STEPS ---
      - name: Setup Pages Configuration
        uses: actions/configure-pages@v5

      - name: Package Static Site Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads everything in the root folder (index.html, app.js, data/, etc.)

      - name: Deploy to GitHub Pages Live Live
        id: deployment
        uses: actions/deploy-pages@v4
