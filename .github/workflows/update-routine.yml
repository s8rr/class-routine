name: Update Routine and Deploy to Pages

on:
  push:
    branches:
      - main
    paths:
      - 'routine.pdf'
      - 'scripts/extract_routine.py'
      - 'index.html'           # ADDED: Triggers if you update your frontend
      - 'js/**'                # OPTIONAL: Add if you have a JS folder
      - 'css/**'               # OPTIONAL: Add if you have a CSS folder
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  process-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Extract Data from PDF
        run: |
          python scripts/extract_routine.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all potential changes (JSON, HTML, etc.)
          git add data/routine_data.json index.html
          
          # Check if there are any changes to commit
          if git diff --staged --quiet; then
            echo "No changes detected, skipping commit."
          else
            echo "Changes detected, committing and pushing."
            git commit -m "Auto-update routine and site files [bot]"
            git pull --rebase origin main
            git push
          fi

      - name: Setup Pages Configuration
        uses: actions/configure-pages@v5

      - name: Package Static Site Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages Live
        id: deployment
        uses: actions/deploy-pages@v4
