<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSE Class Routine — Spring 2026</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="uni-logo">PU</div>
      <div class="header-text">
        <p class="dept-name">Dept. of Computer Science &amp; Engineering</p>
        <h1 class="site-title">Class Routine</h1>
        <p class="session-label">Spring 2026 · Premier University</p>
      </div>
    </div>
  </header>

  <main class="main-content">

    <!-- Step 1: Pick semester -->
    <section class="step-section">
      <h2 class="step-label">Select Semester</h2>
      <div id="semester-grid" class="semester-grid"></div>
    </section>

    <!-- Step 2: Pick section (shown after semester selected) -->
    <section class="step-section" id="section-wrapper" style="display:none;">
      <h2 class="step-label">Select Section</h2>
      <div class="select-wrap">
        <select id="section-select">
          <option value="">— Select Section —</option>
        </select>
        <span class="select-arrow">▾</span>
      </div>
    </section>

    <!-- Routine output -->
    <section id="routine-output" class="routine-output"></section>

  </main>

  <footer class="site-footer">
    Premier University · DCSE · Spring 2026
  </footer>

  <script src="app.js"></script>
</body>
</html>
